version: 2.1

executors:
  flutter:
    docker:
      - image: ghcr.io/cirruslabs/flutter:3.41.2
    working_directory: ~/project

commands:
  restore_flutter_cache:
    steps:
      - restore_cache:
          keys:
            - flutter-pub-v1-{{ checksum "pubspec.lock" }}
            - flutter-pub-v1-

  save_flutter_cache:
    steps:
      - save_cache:
          key: flutter-pub-v1-{{ checksum "pubspec.lock" }}
          paths:
            - ~/.pub-cache

jobs:
  daily_maintenance:
    executor: flutter
    steps:
      - checkout

      - run:
          name: Flutter Version
          command: flutter --version

      - restore_flutter_cache

      - run:
          name: Get Dependencies
          command: flutter pub get

      - save_flutter_cache

      - run:
          name: Static Analysis
          command: flutter analyze --fatal-infos

      - run:
          name: Run Unit Tests
          command: flutter test --no-pub --coverage

workflows:
  daily_maintenance:
    triggers:
      - schedule:
          cron: "0 6 * * *"
          filters:
            branches:
              only:
                - main
                - master
    jobs:
      - daily_maintenance
