<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>browser</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      color: #fff;
      text-align: center;
    }
    h1 {
      font-size: 2rem;
      font-weight: 200;
      margin: 0;
      letter-spacing: 0.1em;
      text-transform: lowercase;
    }
    p {
      margin: .25rem 0 1.5rem;
      opacity: .5;
      font-size: .875rem;
      font-weight: 300;
    }
    a {
      color: inherit;
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: .5rem 1.5rem;
      border-radius: 100px;
      font-size: .75rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: all .2s ease;
    }
    a:hover {
      background: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>
  <h1>browser</h1>
  <p>desktop web browser for macOS</p>
  <a href="https://github.com/bniladridas/browser/releases/latest/download/browser.dmg">download</a>
</body>
</html>
