<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>browser</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: #fff;
      color: #000;
      padding: 1rem;
      box-sizing: border-box;
    }
    .loader {
      width: 24px;
      height: 24px;
      border: 1.5px solid #e5e5e5;
      border-top: 1.5px solid #000;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 2rem;
      opacity: 1;
      transition: opacity 0.3s ease;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loaded .loader {
      opacity: 0;
    }
    .loaded .loader,
    .loaded .loader {
      pointer-events: none;
    }
    img {
      margin-bottom: 2rem;
      max-width: 100%;
      height: auto;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 400;
      margin: 0 0 1.5rem;
      letter-spacing: -0.02em;
    }
    a {
      color: inherit;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="loader"></div>
  <img src="image.png" width="500" onload="setTimeout(() => document.body.classList.add('loaded'), 500)">
  <h1>browser</h1>
  <a href="https://github.com/bniladridas/browser/releases/latest/download/browser.dmg">download</a>
  <span style="margin: 0 0.5rem">·</span>
  <a href="https://bniladridas.medium.com/notes-520da32fc748">notes</a>
</body>
</html>
